name: CI/CD - Gestion Marchandises
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  test-produit-service:
    name: Tests produit-service
    runs-on: ubuntu-latest
    steps:
      - name: Recuperer le code
        uses: actions/checkout@v4
      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Lancer les tests
        working-directory: produit-service
        run: |
          chmod +x mvnw
          ./mvnw test

  test-fournisseur-service:
    name: Tests fournisseur-service
    runs-on: ubuntu-latest
    steps:
      - name: Recuperer le code
        uses: actions/checkout@v4
      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Lancer les tests
        working-directory: fournisseur-service
        run: |
          chmod +x mvnw
          ./mvnw test

  test-stock-service:
    name: Tests stock-service
    runs-on: ubuntu-latest
    steps:
      - name: Recuperer le code
        uses: actions/checkout@v4
      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Lancer les tests
        working-directory: stock-service
        run: |
          chmod +x mvnw
          ./mvnw test

  build:
    name: Build tous les services
    runs-on: ubuntu-latest
    needs: [test-produit-service, test-fournisseur-service, test-stock-service]
    steps:
      - name: Recuperer le code
        uses: actions/checkout@v4
      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build produit-service
        working-directory: produit-service
        run: |
          chmod +x mvnw
          ./mvnw package -DskipTests
      - name: Build fournisseur-service
        working-directory: fournisseur-service
        run: |
          chmod +x mvnw
          ./mvnw package -DskipTests
      - name: Build stock-service
        working-directory: stock-service
        run: |
          chmod +x mvnw
          ./mvnw package -DskipTests